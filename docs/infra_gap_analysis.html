49.0, "하수도(m)_U형측구": 6708.0, "횡단하수거(m)": 106.0, "맨홀(개소)": 10412.0, "빗물받이(개소)": 22485.0, "보급률(%)": 100.0, "area": 24.59, "pop": 47.0, "banjihha": 7200}];
const COLS = ["하수도(m)_암거", "하수도(m)_개거", "하수도(m)_관거", "하수도(m)_U형측구", "횡단하수거(m)", "맨홀(개소)", "빗물받이(개소)", "보급률(%)"];
let currentCol = COLS[0];
let normalizeMode = 'abs';

// ── 초기화 ──
function init() {
  // 컬럼 선택 버튼
  const selector = document.getElementById('col-selector');
  COLS.forEach((col, i) => {
    const btn = document.createElement('button');
    btn.textContent = col;
    btn.className = i === 0 ? 'active' : '';
    btn.onclick = () => {
      currentCol = col;
      selector.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderChart();
    };
    selector.appendChild(btn);
  });

  renderMetrics();
  renderChart();
}

// ── 핵심 지표 카드 ──
function renderMetrics() {
  const grid = document.getElementById('metric-grid');
  const gw = DATA.find(d => d.is_gwanak);
  if (!gw) return;

  // 각 지표에서 관악구 순위 계산
  const metrics = COLS.slice(0, 4).map(col => {
    const sorted = DATA.filter(d => d[col] != null).sort((a, b) => b[col] - a[col]);
    const rank = sorted.findIndex(d => d.is_gwanak) + 1;
    const avg = sorted.reduce((s, d) => s + d[col], 0) / sorted.length;
    const val = gw[col];
    const pctOfAvg = val ? Math.round((val / avg) * 100) : null;
    return { col, val, rank, total: sorted.length, avg, pctOfAvg };
  });

  // 반지하 가구 카드
  grid.innerHTML = `
    <div class="metric-card highlight">
      <div class="metric-label">반지하 가구</div>
      <div class="metric-value danger">29,481</div>
      <div class="metric-rank">서울 25개 구 중 1위 (최다)</div>
    </div>
  ` + metrics.map(m => `
    <div class="metric-card">
      <div class="metric-label">${m.col}</div>
      <div class="metric-value">${m.val != null ? m.val.toLocaleString() : '-'}</div>
      <div class="metric-rank">25개 구 중 ${m.rank}위 · 평균 대비 ${m.pctOfAvg}%</div>
    </div>
  `).join('');
}

// ── 정규화 설정 ──
function setNormalize(mode) {
  normalizeMode = mode;
  document.querySelectorAll('#normalize-toggle button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderChart();
}

// ── 차트 렌더 ──
function renderChart() {
  const chart = document.getElementById('main-chart');

  // 정규화 계산
  let items = DATA.filter(d => d[currentCol] != null).map(d => {
    let val = d[currentCol];
    let suffix = '';
    if (normalizeMode === 'area' && d.area) {
      val = val / d.area;
      suffix = ' /km²';
    } else if (normalizeMode === 'pop' && d.pop) {
      val = val / d.pop;
      suffix = ' /만명';
    } else if (normalizeMode === 'banjihha' && d.banjihha) {
      val = (val / d.banjihha) * 1000;
      suffix = ' /천가구';
    }
    return { gu: d.gu, val, is_gwanak: d.is_gwanak, suffix };
  });

  // 정렬 (내림차순)
  items.sort((a, b) => b.val - a.val);
  const maxVal = Math.max(...items.map(d => d.val));
  const avg = items.reduce((s, d) => s + d.val, 0) / items.length;
  const gwItem = items.find(d => d.is_gwanak);
  const gwRank = items.findIndex(d => d.is_gwanak) + 1;

  chart.innerHTML = items.map(d => {
    const pct = (d.val / maxVal) * 100;
    const avgPct = (avg / maxVal) * 100;
    const cls = d.is_gwanak ? 'gwanak' : 'normal';
    const labelCls = d.is_gwanak ? 'bar-label is-gwanak' : 'bar-label';
    const formatted = d.val >= 1000 ? d.val.toLocaleString(undefined, {maximumFractionDigits: 0})
                    : d.val >= 1 ? d.val.toFixed(1)
                    : d.val.toFixed(2);
    return `
      <div class="bar-row">
        <div class="${labelCls}">${d.gu.replace('구', '')}</div>
        <div class="bar-track">
          <div class="bar-fill ${cls}" style="width:${pct}%">
            <span>${formatted}${d.suffix}</span>
          </div>
        </div>
      </div>
    `;
  }).join('');

  // 인사이트 생성
  renderInsight(gwItem, gwRank, items.length, avg);
}

// ── 인사이트 ──
function renderInsight(gw, rank, total, avg) {
  const box = document.getElementById('insight-box');
  if (!gw) { box.innerHTML = ''; return; }

  const pctOfAvg = Math.round((gw.val / avg) * 100);
  const modeLabel = {
    'abs': '절대값',
    'area': 'km²당',
    'pop': '인구 만명당',
    'banjihha': '반지하 1천가구당'
  }[normalizeMode];

  let interpretation = '';
  if (normalizeMode === 'banjihha') {
    if (rank > total * 0.6) {
      interpretation = `반지하 가구 1,000가구당 인프라 밀도에서 관악구는 하위권에 위치합니다. `
        + `이는 반지하 가구가 서울 최다임에도 불구하고, 이들을 보호할 인프라가 비례적으로 부족하다는 의미입니다. `
        + `침수 시 동일한 인프라가 더 많은 취약 가구를 감당해야 하는 구조적 과부하 상태입니다.`;
    } else {
      interpretation = `이 지표에서는 관악구가 상대적으로 양호한 편입니다. `
        + `다만 이는 절대량이 많기 때문일 수 있으므로, 다른 지표와 교차 검토가 필요합니다.`;
    }
  } else if (normalizeMode === 'area') {
    if (rank <= total * 0.4) {
      interpretation = `면적 대비로는 관악구가 중상위권입니다. 이는 관악구의 면적이 상대적으로 넓지 않기 때문일 수 있습니다.`;
    } else {
      interpretation = `면적 대비로도 관악구의 인프라 밀도가 낮은 편입니다. `
        + `경사지와 저지대가 혼재하는 지형 특성을 고려하면, 면적당 인프라 밀도가 더 높아야 합니다.`;
    }
  } else {
    if (rank > total * 0.5) {
      interpretation = `관악구는 서울 25개 구 중 ${rank}위로, 하위 ${Math.round((rank/total)*100)}%에 해당합니다. `
        + `서울 평균 대비 ${pctOfAvg}% 수준입니다.`;
    } else {
      interpretation = `이 지표에서는 관악구가 ${rank}위로, 서울 평균(${pctOfAvg}%)과 비교할 수 있습니다.`;
    }
  }

  box.innerHTML = `
    <h3>📌 ${currentCol} — ${modeLabel} 기준</h3>
    <p>
      관악구 순위: <b>${total}개 구 중 ${rank}위</b>
      (서울 평균 대비 <b>${pctOfAvg}%</b>)<br>
      ${interpretation}
    </p>
  `;
}

init();
</script>
